<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>発注管理システム - 発注一覧（実战）</title>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <style>
    body { margin:0; font-family:'Segoe UI', sans-serif; background-color:#f4f6f9; }
    .sidebar { height:100vh; background-color:#152855; color:white; padding:1rem; min-width:240px; }
    .sidebar a { color:white; text-decoration:none; display:block; margin:.8rem 0; padding:.4rem .8rem; border-radius:4px; }
    .sidebar a:hover, .sidebar a.active { background-color:#495057; }
    .topbar { background-color:white; padding:1rem 2rem; border-bottom:1px solid #dee2e6; }
    .badge-status { font-size:.85rem; }
    .main { padding:2rem; flex-grow:1; }
    .table thead { background-color:#0d6efd; color:white; }
    .action-buttons button { margin-right:5px; }
    .pagination-info { font-size:.9rem; }
    .hint { font-size:.9rem; color:#6c757d; }
    code { background:#fff3cd; padding:.1rem .25rem; border-radius:.25rem; }
  </style>
</head>

<body>
<div class="d-flex">
  <div class="sidebar">
    <h4 class="mb-4">発注管理</h4>
    <a href="./index.html"><i class="bi bi-house-door me-2"></i>ワークショップTOP</a>
    <a href="#" class="active"><i class="bi bi-list-check me-2"></i>発注一覧</a>
    <a href="#"><i class="bi bi-hourglass-split me-2"></i>仕入先管理（未実装）</a>
    <a href="#"><i class="bi bi-printer me-2"></i>発注書出力（未実装）</a>
    <a href="#"><i class="bi bi-gear me-2"></i>設定（未実装）</a>
  </div>

  <div class="d-flex flex-column flex-grow-1">
    <div class="topbar d-flex justify-content-between align-items-center">
      <div>
        <h5 class="mb-0">発注一覧</h5>
        <div class="hint">TODO：把“写死的表格”改成“从后端取数据渲染”。重点：同步/异步写法。</div>
      </div>
      <div>
        <button id="btnExportCsv" class="btn btn-outline-primary btn-sm">CSV出力（未実装）</button>
        <button class="btn btn-success btn-sm" data-bs-toggle="modal" data-bs-target="#newOrderModal">新規発注</button>
      </div>
    </div>

    <div class="main">
      <div class="card shadow-sm p-3 mb-4 search-area">
        <div class="row g-2 align-items-end">
          <div class="col-md-3">
            <label class="form-label">発注ID</label>
            <input id="qOrderId" type="text" class="form-control" placeholder="例：H2025001">
          </div>
          <div class="col-md-3">
            <label class="form-label">発注者</label>
            <input id="qUser" type="text" class="form-control" placeholder="例：山田太郎">
          </div>
          <div class="col-md-3">
            <label class="form-label">発注日（FROM）</label>
            <input id="qFrom" type="date" class="form-control">
          </div>
          <div class="col-md-3">
            <label class="form-label">発注日（TO）</label>
            <input id="qTo" type="date" class="form-control">
          </div>

          <div class="col-md-3">
            <label class="form-label">ステータス</label>
            <select id="qStatus" class="form-select">
              <option value="">すべて</option>
              <option value="PENDING">承認待ち</option>
              <option value="APPROVED">承認済</option>
              <option value="REJECTED">却下</option>
            </select>
          </div>

          <div class="col-md-9 text-end">
            <button id="btnSearch" class="btn btn-primary me-2">
              <i class="bi bi-search me-1"></i>検索
            </button>
            <button id="btnClear" class="btn btn-secondary">クリア</button>
          </div>
        </div>

        <div class="mt-2 hint">
          API：<code>GET /api/orders</code>（按条件过滤 + 分页） / <code>GET /api/orders/{id}</code> / <code>POST /api/orders</code>
        </div>
      </div>

      <table class="table table-bordered table-hover align-middle">
        <thead>
          <tr>
            <th>発注ID</th>
            <th>発注日</th>
            <th>発注者</th>
            <th>仕入先</th>
            <th>商品数</th>
            <th>合計金額</th>
            <th>ステータス</th>
            <th class="text-center">操作</th>
          </tr>
        </thead>
        <tbody id="ordersTbody">
          <!-- TODO(学员)：这里要用 JS 渲染后端返回的数据 -->
          <tr class="text-muted">
            <td colspan="8" class="text-center py-4">
              아직未加载。点击“検索”从后端加载数据。
            </td>
          </tr>
        </tbody>
      </table>

      <div class="d-flex justify-content-between align-items-center mt-3">
        <div id="pageInfo" class="pagination-info">-</div>
        <nav>
          <ul class="pagination pagination-sm mb-0">
            <li class="page-item"><a id="btnPrev" class="page-link" href="#">前へ</a></li>
            <li class="page-item active"><a id="pageNo" class="page-link" href="#">1</a></li>
            <li class="page-item"><a id="btnNext" class="page-link" href="#">次へ</a></li>
          </ul>
        </nav>
      </div>

    </div>
  </div>
</div>

<!-- 新規発注モーダル -->
<div class="modal fade" id="newOrderModal" tabindex="-1" aria-labelledby="newOrderModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-lg modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header bg-light">
        <h5 class="modal-title" id="newOrderModalLabel">新規発注登録</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="閉じる"></button>
      </div>
      <div class="modal-body">
        <div class="row mb-3">
          <div class="col-md-6">
            <label for="orderDate" class="form-label">発注日</label>
            <input type="date" class="form-control" id="orderDate">
          </div>
          <div class="col-md-6">
            <label for="orderUser" class="form-label">発注者名</label>
            <input type="text" class="form-control" id="orderUser" placeholder="例：山田太郎">
          </div>
        </div>
        <hr>
        <h6>商品情報</h6>
        <div id="productList"></div>
        <button id="btnAddRow" class="btn btn-outline-primary btn-sm mb-3" type="button">＋ 商品追加</button>

        <div class="mb-3">
          <label for="note" class="form-label">備考</label>
          <textarea id="note" class="form-control" rows="2" placeholder="必要に応じて入力"></textarea>
        </div>
        <div class="alert alert-warning d-none" id="orderWarning">※ 発注者名と商品を入力してください。</div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">キャンセル</button>
        <button id="btnSubmitOrder" class="btn btn-primary" type="button">登録</button>
      </div>
    </div>
  </div>
</div>

<!-- 详情 Modal（示例：学员可扩展） -->
<div class="modal fade" id="orderDetailModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-lg modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header bg-light">
        <h5 class="modal-title">発注詳細</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="閉じる"></button>
      </div>
      <div class="modal-body">
        <pre id="detailJson" class="mb-0 small bg-light p-3 rounded">-</pre>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script type="module">
  import { qs, formatJPY, toast } from "./common.js";
  import { searchOrders, getOrder, createOrder } from "./api.js";

  // ====== 练习目标（学员）：把下面 TODO 补全 ======
  // 你(讲师)已经把“结构、UI、API 封装”准备好，学员只要实现：
  // 1) 点击 검색 => 调用 searchOrders 并渲染表格
  // 2) 点击 详细 => 调用 getOrder 并弹出 Modal
  // 3) 新规发注 => 收集输入后调用 createOrder，然后刷新列表
  // 并在“串行 vs 并发”处做对比（可选）

  let page = 1;
  const size = 10;

  function addProductRow(){
    const row = document.createElement("div");
    row.className = "row g-2 mb-2";
    row.innerHTML = `
      <div class="col-md-5"><input type="text" class="form-control" placeholder="商品名"></div>
      <div class="col-md-2"><input type="number" class="form-control" placeholder="数量" value="1" min="1"></div>
      <div class="col-md-3"><input type="number" class="form-control" placeholder="単価" value="0" min="0"></div>
      <div class="col-md-2"><button class="btn btn-danger w-100" type="button">削除</button></div>`;
    row.querySelector("button").addEventListener("click", ()=> row.remove());
    qs("#productList").appendChild(row);
  }

  qs("#btnAddRow").addEventListener("click", addProductRow);
  addProductRow();

  qs("#btnClear").addEventListener("click", ()=>{
    qs("#qOrderId").value = "";
    qs("#qUser").value = "";
    qs("#qFrom").value = "";
    qs("#qTo").value = "";
    qs("#qStatus").value = "";
    toast("已清空条件", "secondary");
  });

  async function load(){
    // TODO(学员)：把表格渲染逻辑补全
    const params = {
      orderId: qs("#qOrderId").value,
      user: qs("#qUser").value,
      dateFrom: qs("#qFrom").value,
      dateTo: qs("#qTo").value,
      status: qs("#qStatus").value,
      page, size
    };

    try{
      const data = await searchOrders(params);
      // data: { items: [...], page, size, total }
      qs("#pageNo").textContent = String(data.page);
      qs("#pageInfo").textContent = `${(data.items.length ? ((data.page-1)*data.size+1) : 0)}-${(data.page-1)*data.size+data.items.length}件 / 全${data.total}件`;

      const tbody = qs("#ordersTbody");
      tbody.innerHTML = "";

      if(data.items.length === 0){
        tbody.innerHTML = `<tr class="text-muted"><td colspan="8" class="text-center py-4">該当データなし</td></tr>`;
        return;
      }

      for(const o of data.items){
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${o.id}</td>
          <td>${o.orderDate}</td>
          <td>${o.orderUser}</td>
          <td>${o.supplier}</td>
          <td>${o.itemCount}</td>
          <td>${formatJPY(o.totalAmount)}</td>
          <td>${renderStatus(o.status)}</td>
          <td class="text-center action-buttons">
            <button class="btn btn-sm btn-outline-primary" data-action="detail">詳細</button>
            <button class="btn btn-sm btn-outline-warning" disabled>編集</button>
            <button class="btn btn-sm btn-outline-danger" disabled>削除</button>
          </td>`;
        tr.querySelector("[data-action='detail']").addEventListener("click", ()=> openDetail(o.id));
        tbody.appendChild(tr);
      }
    }catch(e){
      toast("加载失败：" + e.message, "danger");
      console.error(e);
    }
  }

  function renderStatus(status){
    if(status === "PENDING") return `<span class="badge bg-warning text-dark badge-status">承認待ち</span>`;
    if(status === "APPROVED") return `<span class="badge bg-success badge-status">承認済</span>`;
    if(status === "REJECTED") return `<span class="badge bg-danger badge-status">却下</span>`;
    return `<span class="badge bg-secondary badge-status">${status}</span>`;
  }

  async function openDetail(id){
    try{
      // TODO(学员)：可选——把这里改成“并发”取更多信息（例如统计 / 相关数据）
      const detail = await getOrder(id);
      qs("#detailJson").textContent = JSON.stringify(detail, null, 2);
      new bootstrap.Modal(qs("#orderDetailModal")).show();
    }catch(e){
      toast("详情获取失败：" + e.message, "danger");
    }
  }

  qs("#btnSearch").addEventListener("click", ()=>{ page = 1; load(); });

  qs("#btnPrev").addEventListener("click", (ev)=>{
    ev.preventDefault();
    if(page <= 1) return;
    page--;
    load();
  });

  qs("#btnNext").addEventListener("click", (ev)=>{
    ev.preventDefault();
    page++;
    load();
  });

  qs("#btnSubmitOrder").addEventListener("click", async ()=>{
    const user = qs("#orderUser").value.trim();
    const date = qs("#orderDate").value;
    const rows = Array.from(qs("#productList").children);

    const items = rows.map(r=>{
      const inputs = r.querySelectorAll("input");
      return {
        name: inputs[0].value.trim(),
        qty: Number(inputs[1].value || 0),
        price: Number(inputs[2].value || 0),
      };
    }).filter(x=>x.name);

    if(!user || items.length === 0){
      qs("#orderWarning").classList.remove("d-none");
      return;
    }
    qs("#orderWarning").classList.add("d-none");

    try{
      await createOrder({ orderUser:user, orderDate: date, items, note: qs("#note").value });
      toast("登録完了（固定返回）", "success");
      bootstrap.Modal.getInstance(qs("#newOrderModal")).hide();
      load();
    }catch(e){
      toast("登録失败：" + e.message, "danger");
    }
  });

  // 初次不自动加载，留给学员按按钮触发
</script>
</body>
</html>
