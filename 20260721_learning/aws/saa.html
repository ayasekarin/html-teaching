<!DOCTYPE html>
<html lang="zh-CN">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>AWSなんでもメモ場</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
            rel="stylesheet">
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box
            }

            body {
                font-family: Inter, sans-serif;
                background: radial-gradient(circle at top, #dbeafe 0%, #f8fafc 40%, #fff 100%);
                color: #1f2937;
            }

            header {
                position: sticky;
                top: 0;
                z-index: 10;
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding: 18px 40px;
                background: rgba(255, 255, 255, .65);
                backdrop-filter: blur(18px);
                border-bottom: 1px solid rgba(255, 255, 255, .5);
            }

            .logo {
                text-decoration: none;
                font-weight: 700;
                font-size: 24px;
                color: #111827;
            }

            .search {
                padding: 12px 18px;
                border: none;
                border-radius: 14px;
                background: #fff;
                box-shadow: 0 8px 20px rgba(0, 0, 0, .05);
                width: 260px;
            }

            .layout {
                display: grid;
                grid-template-columns: 260px minmax(0, 1fr) 240px;
                gap: 28px;
                max-width: 1500px;
                margin: 35px auto;
                padding: 0 25px;
            }

            .card {
                background: rgba(255, 255, 255, .65);
                backdrop-filter: blur(20px);
                border-radius: 22px;
                padding: 24px;
                box-shadow: 0 12px 30px rgba(0, 0, 0, .05);
            }

            .sidebar a,
            .toc a {
                display: block;
                padding: 10px 14px;
                margin: 6px 0;
                text-decoration: none;
                color: #4b5563;
                border-radius: 12px;
                transition: .25s;
            }

            .sidebar a:hover,
            .toc a:hover {
                background: #2563eb;
                color: #fff;
                transform: translateX(4px);
            }

            .badge {
                display: inline-block;
                background: #dbeafe;
                color: #2563eb;
                padding: 6px 12px;
                border-radius: 999px;
                font-size: 13px;
                font-weight: 600;
                margin-bottom: 18px;
            }

            .back {
                display: inline-block;
                margin-bottom: 18px;
                text-decoration: none;
                color: #2563eb;
                font-weight: 600;
            }

            h1 {
                font-size: 44px;
                margin-bottom: 12px
            }

            .meta {
                color: #6b7280;
                margin-bottom: 35px
            }

            h2 {
                margin: 40px 0 16px
            }

            p {
                line-height: 1.9;
                color: #4b5563;
                margin-bottom: 16px
            }

            pre {
                background: #111827;
                color: #e5e7eb;
                padding: 18px;
                border-radius: 16px;
                overflow: auto;
                margin: 20px 0;
            }

            .bottom-nav {
                display: flex;
                justify-content: space-between;
                margin-top: 40px;
            }

            .bottom-nav a {
                text-decoration: none;
                color: #2563eb;
                font-weight: 600;
            }

            @media(max-width:1100px) {
                .layout {
                    grid-template-columns: 1fr
                }

                .toc {
                    display: none
                }
            }

            .page {
                display: none;
            }

            .page.active {
                display: block;
            }
        </style>
    </head>

    <body>

        <header>
            <a class="logo" href="../index.html">なんでもメモ場</a>
            <input class="search" placeholder="Search...">
        </header>

        <div class="layout">

            <div class="sidebar card">
                <h3>AWS</h3>
                <a href="#" onclick="showPage('CLF');return false;">・CLF</a>
                <a href="#" onclick="showPage('SAA');return false;">・SAA</a>
            </div>

            <main class="card">
                <div id="CLF" class="page active">
                    <span class="badge">AWS</span>
                    <h1>CLF</h1>
                    <p><label><input type="checkbox">・Amazon Snowball Edge Amazon Snowball Edge
                            是一个“寄给你用的离线数据传输设备”，用来把大量数据搬到 AWS（或从 AWS 搬出来）。</label></p>
                    <p><label><input type="checkbox">・Amazon Inspector Amazon Inspector 是一个自动帮你检查 AWS 资源安全漏洞的服务，主要用来发现
                            EC2、容器、Lambda 里的安全问题。</label></p>
                    <p><label><input type="checkbox">・AWS Config AWS Config 是一个用来记录 AWS
                            资源配置变化，并检查是否符合规则（合规性）的服务。</label></p>
                    <p><label><input type="checkbox">・Amazon GuardDuty Amazon GuardDuty 是一个持续监控 AWS
                            环境安全威胁的智能检测服务，主要用来发现“正在发生的攻击或异常行为”。</label></p>
                    <p><label><input type="checkbox">・AWS Trusted Advisor AWS Trusted Advisor = 帮你检查 AWS
                            资源是否符合“最佳实践”的工具（发现问题 + 给建议）。</label></p>
                    <p><label><input type="checkbox">・Amazon S3 Amazon S3 = 一个“无限容量的云端对象存储”，不是硬盘，也不是传统文件系统</label></p>
                    <p><label><input type="checkbox">・AWS Storage Gateway AWS Storage Gateway =
                            把“本地存储”和“AWS云存储”连起来的桥梁（本地用起来像硬盘/共享盘，背后其实在用云）</label></p>
                    <p><label><input type="checkbox">・Amazon WorkSpaces 👉 Amazon WorkSpaces = AWS
                            提供的“云端电脑（虚拟桌面）”，你可以远程登录使用，就像一台在云里的 Windows/Mac。</label></p>
                    <p><label><input type="checkbox">・Amazon Elastic Block Store（EBS) 👉 Amazon Elastic Block
                            Store（EBS）= 挂在云服务器（EC2）上的“云硬盘”</label></p>
                    <p><label><input type="checkbox">・IAM User AWS Identity and Access Management 中的 IAM User（IAM 用户）
                            是一个代表“具体个人或程序”的身份实体，用于在 AWS 里进行登录和访问资源。</label></p>
                    <p><label><input type="checkbox">・IAM Role AWS Identity and Access Management 中的 IAM Role（IAM 角色）
                            是一个**“临时权限身份”**，用于让 AWS 服务或用户“暂时获得某些权限”，而不是长期绑定账号。</label></p>
                    <p><label><input type="checkbox">・Shared Responsibility Model 👉 Shared Responsibility
                            Model（共享责任模型）= AWS 和你“分工负责安全”的规则：AWS 管云本身，你管你在云里用的东西</label></p>
                    <p><label><input type="checkbox">・DynamoDB 👉 Amazon DynamoDB = AWS 提供的“全托管 NoSQL
                            数据库”，特点是：超快、自动扩展、几乎不用运维</label></p>
                    <p><label><input type="checkbox">・AWS Cloud Adoption Framework (AWS CAF) AWS Cloud Adoption
                            Framework 是 AWS 提供的一套帮助企业“规划 + 推进上云”的方法论框架，用来指导组织从传统IT转向云架构。</label></p>
                    <p><label><input type="checkbox">・AWS Fargate 👉 AWS Fargate = 一个“无需管理服务器的容器运行平台”，你只管跑 Docker，其他 AWS
                            全帮你搞定</label></p>
                    <p><label><input type="checkbox">・Amazon Athena 👉 Amazon Athena = 一个“直接在 S3 上查数据的服务”，不用建数据库，用 SQL
                            就能查</label></p>
                    <p><label><input type="checkbox">・AWS Lambda 👉 AWS Lambda = 让你“只写代码就能运行”的服务，不用管服务器（真正的
                            Serverless）</label></p>
                    <p><label><input type="checkbox">・AWS Cost Explorer 👉 AWS Cost Explorer = 一个“可视化分析 AWS
                            花钱情况的工具”，帮你看钱花在哪、还能怎么省</label></p>
                    <p><label><input type="checkbox">・AWS Compute Optimizer 👉 AWS Compute Optimizer =
                            一个用机器学习帮你“调资源规格（省钱+提性能）”的工具</label></p>
                    <p><label><input type="checkbox">・AWS Billing Conductor 👉 AWS Billing Conductor =
                            用来“自定义和分摊账单”的工具，主要给企业做内部成本管理（不是用来省钱的）</label></p>
                    <p><label><input type="checkbox">・Amazon CodeGuru 👉 Amazon CodeGuru = 一个“帮你审代码、找性能问题”的 AI
                            工具（不是用来管基础设施的）</label></p>
                    <p><label><input type="checkbox">・Amazon SageMaker 👉 Amazon SageMaker = 一个“从训练到部署一条龙的机器学习平台”，帮你快速做
                            AI 模型</label></p>
                    <p><label><input type="checkbox">・AWS Resource Explorer 👉 AWS Resource Explorer = 一个“帮你快速搜索所有 AWS
                            资源”的工具</label></p>
                    <p><label><input type="checkbox">・AWS Service Catalog 👉 AWS Service Catalog =
                            一个“公司内部应用/基础设施模板商店”，用来统一发布 + 控制谁能部署什么**</label></p>
                    <p><label><input type="checkbox">・AWS Organizations 👉 AWS Organizations = 用来“统一管理多个 AWS
                            账号”的服务（集中管账号、权限和账单）</label></p>
                    <p><label><input type="checkbox">・AWS Systems Manager 👉 AWS Systems Manager =
                            一个“统一管理和运维服务器（EC2/本地）的工具”，帮你自动化操作、打补丁、远程控制</label></p>
                    <p><label><input type="checkbox">・AWS Pricing Calculator 👉 AWS Pricing Calculator = 一个“帮你预估 AWS
                            使用成本”的工具（上云前算钱用的）</label></p>
                    <p><label><input type="checkbox">・AWS Glue 👉 AWS Glue = 一个“自动做数据清洗和转换（ETL）的服务”，帮你把数据整理好再分析</label>
                    </p>
                    <p><label><input type="checkbox">・Amazon Elastic File System（EFS） 👉 Amazon Elastic File
                            System（EFS）= 一个“可以被多台服务器同时访问的共享文件系统”Linux共享文件系统（最省心</label></p>
                    <p><label><input type="checkbox">・Amazon Redshift 👉 Amazon Redshift = 一个“专门做大数据分析的数据库（数据仓库）”，适合跑复杂
                            SQL 分析</label></p>
                    <p><label><input type="checkbox">・Amazon QuickSight 👉 Amazon QuickSight = AWS
                            的“数据可视化工具”，把数据变成图表和仪表盘（BI）</label></p>
                    <p><label><input type="checkbox">・Amazon Quantum Ledger Database (Amazon QLDB) 👉 Amazon Quantum
                            Ledger Database（QLDB）= 一个“数据不可篡改、可追溯”的账本数据库（类似区块链，但更简单）</label></p>
                    <p><label><input type="checkbox">・AWS Support 👉 AWS Support = AWS
                            提供的“官方技术支持服务”，帮你解决故障、性能、账单等问题</label></p>
                    <p><label><input type="checkbox">・AWS Professional Services 👉 AWS Professional Services = AWS
                            提供的“专家咨询与落地实施服务”，帮企业设计、迁移和优化云架构</label></p>
                    <p><label><input type="checkbox">・AWS Launch Wizard 👉 AWS Launch Wizard = 一个“帮你一步步自动部署复杂应用（如
                            SAP）的向导工具”</label></p>
                    <p><label><input type="checkbox">・AWS Managed Services (AMS) 👉 AWS Managed Services = AWS
                            帮企业“代管云环境”的服务，相当于把日常运维外包给 AWS</label></p>
                    <p><label><input type="checkbox">・Reserved Instances 👉 Reserved Instances（预留实例，RI）= 提前承诺使用 EC2
                            等资源，换取更低价格（最高可省约 75%）</label></p>
                    <p><label><input type="checkbox">・Dedicated Hosts 👉 Dedicated Hosts = 把“一整台物理服务器”租给你用的 EC2
                            选项（硬件独占）</label></p>
                    <p><label><input type="checkbox">・Spot Instances 👉 Amazon EC2 Spot Instances = 用“超低价格”使用 AWS
                            闲置计算资源，但可能会被随时回收的 EC2 实例</label></p>
                    <p><label><input type="checkbox">・On-Demand Instances 👉 Amazon EC2 On-Demand Instances = 按需付费的 EC2
                            实例，用多少算多少，没有长期承诺</label></p>
                    <p><label><input type="checkbox">・AWS Elastic Beanstalk 👉 AWS Elastic Beanstalk =
                            一个“帮你自动部署和管理应用的PaaS服务”，你只管代码，AWS帮你搞定服务器</label></p>
                    <p><label><input type="checkbox">・AWS CodeBuild 👉 AWS CodeBuild =
                            一个“自动编译、测试代码的CI服务”，把代码构建过程完全自动化</label></p>
                    <p><label><input type="checkbox">・Amazon Personalize 👉 Amazon Personalize =
                            一个“帮你给用户做个性化推荐”的机器学习服务（类似电商推荐系统）</label></p>
                    <p><label><input type="checkbox">・S3 Lifecycle rules 👉 S3 Lifecycle Rules = 用规则“自动管理 S3
                            对象的存储方式和生命周期”（比如自动转存、删除）</label></p>
                    <p><label><input type="checkbox">・S3 Versioning 👉 Amazon S3 Versioning = 给 S3
                            文件开启“历史版本管理”，避免误删或误覆盖</label></p>
                    <p><label><input type="checkbox">・S3 bucket policies 👉 Amazon S3 Bucket Policy = 用 JSON
                            写的“桶级权限规则”，用来控制谁能访问整个 S3 bucket 或其中的对象</label></p>
                    <p><label><input type="checkbox">・S3 server-side encryption 👉 Amazon S3 Server-Side Encryption =
                            AWS 在服务器端帮你自动把 S3 数据加密存储，用户不用自己处理加密细节</label></p>
                    <p><label><input type="checkbox">・AWS CodePipeline 结论：AWS CodePipeline 是 AWS
                            的持续交付（CI/CD）服务，用来自动化代码从构建、测试到发布的整个流程。</label></p>
                    <p><label><input type="checkbox">・AWS CodeDeploy 结论：AWS CodeDeploy 是一个“自动部署工具”，专门负责把应用安全、可控地发布到 EC2
                            / Lambda / 本地服务器等目标环境。</label></p>
                    <p><label><input type="checkbox">・AWS Direct Connect 结论：AWS Direct Connect 是一条“专用物理网络线路”，用来把本地数据中心和
                            AWS 直接连接起来，比公网 VPN 更稳定、更低延迟、更安全。</label></p>
                    <p><label><input type="checkbox">・AWS CloudFormation 结论：AWS CloudFormation 是“用代码创建和管理 AWS
                            资源”的基础设施即代码（IaC）服务，可以把整套云环境一键部署、更新和回滚。</label></p>
                    <p><label><input type="checkbox">・Spot Fleet 结论：Spot Fleet 是 AWS 用来“批量管理 Spot
                            实例”的服务，可以自动帮你以最低成本组合多种实例类型和可用区来满足容量需求。</label></p>
                    <p><label><input type="checkbox">・Amazon VPC Peering VPC Peering 是一种让两个 VPC 私网直接通信的连接方式，不经过公网、无需
                            VPN，适合简单、低延迟的网络互通。</label></p>
                    <p><label><input type="checkbox">・AWS VPN AWS VPN 是用来实现加密的网络连接（通常是本地数据中心 ↔ AWS），核心就是：安全打通“外部网络”和 AWS
                            VPC。</label></p>
                    <p><label><input type="checkbox">・Amazon Route 53 Amazon Route 53 是 AWS 的托管 DNS 服务 +
                            流量调度工具，核心作用就是：👉 把域名解析到资源，并智能地把流量分配到最合适的地方</label></p>
                    <p><label><input type="checkbox">・AWS DataSync AWS DataSync 是一个高速、自动化的数据迁移服务，用于在本地存储 ↔ AWS（或 AWS ↔
                            AWS）之间传输大量数据，比手写脚本或 rsync 更快、更省心。</label></p>
                    <p><label><input type="checkbox">・Amazon Connect Amazon Connect 是 AWS
                            提供的云呼叫中心（客服系统）服务，可以用来快速搭建电话/在线客服系统，支持语音、聊天、自动语音应答（IVR）等。</label></p>
                    <p><label><input type="checkbox">・AWS Region AWS Region 是 AWS 在全球划分的独立地理区域，每个 Region
                            都是一个相互隔离的云环境。</label></p>
                    <p><label><input type="checkbox">・Amazon Internet Gateway Amazon Internet Gateway 是一个让 VPC
                            能直接访问公网（Internet）的网关组件，本质就是：👉 VPC 的公网入口 + 出口</label></p>
                    <p><label><input type="checkbox">・Loose Coupling（松耦合） 👉 Loose Coupling（松耦合）=
                            各个系统/模块之间“依赖很少、互相独立”，一个出问题不会影响其他。</label></p>
                    <p><label><input type="checkbox">・IAM Access Analyzer IAM Access Analyzer
                            是一个帮你发现“资源是否被外部访问”的安全分析工具，核心作用：👉 检测是否有“意外的对外访问权限”</label></p>
                    <p><label><input type="checkbox">・AWS Artifact AWS Artifact 是一个提供 AWS 合规与审计文档的服务，核心作用：👉 下载 AWS
                            的安全/合规报告（给审计或合规用）</label></p>
                    <p><label><input type="checkbox">・IAM credential report 👉 IAM Credential Report = 查看账号里所有 IAM
                            用户“凭证安全状态”的报表</label></p>
                    <p><label><input type="checkbox">・AWS Audit Manager 👉 AWS Audit Manager
                            是一个自动收集证据、帮助你做合规审计的服务，核心作用：👉 让审计从“人工收集”变成“自动生成报告”</label></p>
                    <p><label><input type="checkbox">・Amazon Simple Queue Service (Amazon SQS) Amazon SQS
                            是一个消息队列服务，核心作用：👉 解耦系统，让不同服务通过“消息”而不是直接调用来通信</label></p>
                    <p><label><input type="checkbox">・AWS Budgets 👉 AWS Budgets 是用来监控成本/使用量并在超出预算时发出告警的服务。</label></p>
                    <p><label><input type="checkbox">・Amazon CloudWatch 👉 Amazon CloudWatch 是 AWS 的监控与告警服务，核心作用：👉 收集指标
                            + 日志 + 触发报警</label></p>
                    <p><label><input type="checkbox">・AWS Cost and Usage Report 👉 AWS Cost and Usage Report
                            是一个最详细的成本与使用数据导出服务，核心作用：👉 生成“超细粒度”的费用明细（用于分析/对账）</label></p>
                    <p><label><input type="checkbox">・AWS Chatbot 👉 AWS Chatbot 是一个把 AWS 通知和操作集成到聊天工具（Slack /
                            Teams）里的服务，核心作用：👉 在聊天软件里接收 AWS 告警并执行操作</label></p>
                    <p><label><input type="checkbox">・AWS Knowledge Center 👉 AWS Knowledge Center 是一个官方问题解答库（FAQ /
                            Troubleshooting 文档集合），核心作用：👉 帮你快速查找 AWS 常见问题的解决方案</label></p>
                    <p><label><input type="checkbox">・Availability Zone（AZ） 👉 一个独立的数据中心（或一组数据中心）</label></p>
                    <p><label><input type="checkbox">・AWS Well-Architected Framework 的 6 大支柱 👉 AWS Well-Architected
                            Framework 是一套 AWS 官方架构最佳实践指南，用来帮你设计安全、稳定、高性能、低成本的系统。</label></p>
                    <p><label><input type="checkbox">・Amazon Simple Notification Service（SNS Amazon Simple Notification
                            Service（SNS）是一个消息通知服务，用于把消息快速推送给多个接收方（人或系统）。</label></p>
                    <p><label><input type="checkbox">・Amazon Simple Email Service (Amazon SES) Amazon Simple Email
                            Service（SES）是一个发送和接收邮件的云服务，主要用于批量发邮件（营销/通知）和系统邮件（验证码、确认邮件）。</label></p>
                    <p><label><input type="checkbox">・AWS Command Line Interface（AWS CLI） AWS Command Line Interface（AWS
                            CLI）是一个命令行工具，让你可以在终端里用命令直接操作 AWS（创建资源、管理服务等）。</label></p>
                    <p><label><input type="checkbox">・AWS API AWS API 是一组程序接口，让你的代码可以直接控制 AWS
                            各种服务（创建资源、查询状态、删除资源等）。</label></p>
                    <p><label><input type="checkbox">・Access keys **Access keys（访问密钥）**是用来让程序（CLI / SDK / API）安全访问 AWS
                            的一对凭证（类似“账号+密码”）。</label></p>
                    <p><label><input type="checkbox">・AWS Key Management Service (AWS KMS) keys AWS Key Management
                            Service（KMS）里的 KMS keys 是用来加密和解密数据的“密钥”，由 AWS 帮你安全管理。</label></p>
                    <p><label><input type="checkbox">・SSH public keys SSH public
                            keys（SSH公钥）是用来实现无密码登录服务器的认证方式，通常和私钥（private key）配对使用。</label></p>
                    <p><label><input type="checkbox">・AWS Batch AWS Batch
                            是一个批处理计算服务，用于自动运行大量任务（job），比如数据处理、计算任务等。</label></p>
                    <p><label><input type="checkbox">・AWS WAF AWS Web Application
                            Firewall（WAF）是一个Web应用防火墙，用来保护你的网站/API免受常见攻击（如SQL注入、XSS等）。</label></p>
                    <p><label><input type="checkbox">・AWS Shield AWS Shield 是 AWS 提供的DDoS 防护服务，用于保护你的系统免受大规模流量攻击。 AWS
